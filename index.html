<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOZ Network — Peer-Reviewed AI Research Publications (2019–2026)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');

        :root {
            --primary: #00ff9d;
            --bg: #0f0f0f;
            --card: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #e0e0e0;
            line-height: 1.6;
        }

        /* ==================== HEADER ==================== */
        header {
            position: relative;
            height: 520px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(15,15,15,0.0), rgba(15,15,15,0.55)),
                        url('static/figures/WallPaper.jpg') center/cover no-repeat;
            z-index: 1;
        }
        header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(transparent, rgba(0, 255, 157, 0.08));
            z-index: 2;
        }
        .header-content {
            position: relative;
            z-index: 3;
            max-width: 900px;
            padding: 0 2rem;
        }
        .logo-sub {
            font-size: 1.25rem;
            color: #ccc;
            margin-bottom: 0.5rem;
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4.2rem;
            font-weight: 600;
            background: linear-gradient(90deg, #00ff9d, #00ffbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 40px rgba(0, 255, 157, 0.6);
        }
        h1.hero-title {
            font-size: 3.1rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: white;
        }
        p.hero-subtitle {
            font-size: 1.25rem;
            color: #ccc;
            max-width: 700px;
            margin: 0 auto;
            min-height: 1.5em;
        }
        .cursor {
            display: inline-block;
            margin-left: 4px;
            color: var(--primary);
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        /* ==================== Highlight Box ==================== */
        .highlight-box {
            position: relative;
            background: radial-gradient(circle at top, rgba(0,255,157,0.08), transparent 70%), var(--card);
            border: 1px solid rgba(0,255,157,0.15);
            border-radius: 24px;
            padding: 3.5rem 2rem;
            text-align: center;
            margin-bottom: 4rem;
            box-shadow: 0 0 60px rgba(0, 255, 157, 0.08),
                        inset 0 0 30px rgba(0,255,157,0.05);
            overflow: hidden;
        }
        .highlight-box::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 24px;
            background: linear-gradient(120deg, transparent, rgba(0,255,157,0.6), transparent);
            opacity: 0.15;
            filter: blur(12px);
            animation: glowMove 6s linear infinite;
        }
        @keyframes glowMove {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(50%); }
        }

        .highlight-badge {
            display: inline-block;
            margin-bottom: 1rem;
            padding: 6px 16px;
            border-radius: 999px;
            background: rgba(0,255,157,0.1);
            color: var(--primary);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .highlight-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .highlight-number {
            font-size: 7rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .highlight-running {
            overflow: hidden;
            white-space: nowrap;
            max-width: 400px;
            position: relative;
        }
        .highlight-running span {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 15s linear infinite;
            color: #bbb;
            font-size: 1.4rem;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .highlight-text-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 1rem;
        }
        .highlight-bg-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 700;
            color: rgba(0, 255, 157, 0.06);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            letter-spacing: 4px;
            transition: opacity 0.4s ease;
        }

        /* ==================== Featured Publications ==================== */
        h2 {
            font-size: 2.2rem;
            margin: 3rem 0 2rem;
            color: white;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 1rem;
            display: inline-block;
        }
        .papers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 2.5rem;
        }
        .paper-card {
            background: var(--card);
            border: 1px solid #222;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }
        .paper-card:hover {
            transform: translateY(-12px);
            border-color: var(--primary);
            box-shadow: 0 25px 50px rgba(0, 255, 157, 0.22);
        }
        .media-container {
            position: relative;
            width: 100%;
            height: 250px;
            background: #222;
            overflow: hidden;
        }
        .media-container img,
        .media-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .paper-content {
            padding: 1.8rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .paper-year { color: var(--primary); font-weight: 600; margin-bottom: 0.6rem; }
        .paper-title { font-size: 1.35rem; font-weight: 600; line-height: 1.35; margin-bottom: 1rem; color: white; }
        .conference a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Holographic Links */
        .paper-links {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        .paper-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            position: relative;
            transition: all 0.3s ease;
        }
        .paper-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(0, 255, 157, 0.15) 50%, 
                transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        .paper-link:hover::before { opacity: 1; }
        .paper-link:hover { transform: translateX(6px); text-shadow: 0 0 15px rgba(0, 255, 157, 0.8); }
        .paper-link span { font-size: 1.15rem; filter: drop-shadow(0 0 8px currentColor); transition: all 0.3s ease; }
        .paper-link:hover span { filter: drop-shadow(0 0 18px currentColor) brightness(1.3); transform: scale(1.15); }

        /* Load More Button */
        .load-more-btn {
            position: relative;
            padding: 12px 28px;
            border-radius: 999px;
            border: 1px solid rgba(0,255,157,0.3);
            background: rgba(0,255,157,0.08);
            color: #00ff9d;
            font-weight: 500;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.35s ease;
        }
        .load-more-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,255,157,0.25);
            color: #fff;
        }
        .load-more-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(0,255,157,0.5), transparent);
            transition: all 0.6s ease;
        }
        .load-more-btn:hover::before { left: 120%; }
        .load-more-btn::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 999px;
            background: linear-gradient(120deg, rgba(0,255,157,0.6), transparent);
            opacity: 0;
            filter: blur(10px);
            transition: opacity 0.4s ease;
        }
        .load-more-btn:hover::after { opacity: 0.6; }
        .load-more-btn:active { transform: scale(0.95); }

        /* Footer */
        footer {
            background: var(--bg);
            border-top: 1px solid #222;
            padding: 3rem 0;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }

    </style>
</head>

    let visibleCount = 10;
    const step = 10;

    function renderPapers() {
        const grid = document.getElementById('papers-grid');
        let html = '';
        papers.slice(0, visibleCount).forEach(paper => {
            const mediaHTML = paper.mediaType === 'video'
                ? `<div class="media-container"><video src="${paper.mediaUrl}" muted loop autoplay playsinline></video></div>`
                : `<div class="media-container"><img src="${paper.mediaUrl}" alt="${paper.title}"></div>`;
            html += `
                <div class="paper-card">
                    ${mediaHTML}
                    <div class="paper-content">
                        <div class="paper-year">${paper.year}</div>
                        <div class="paper-title">${paper.title}</div>
                        <div class="conference">
                            <a href="${paper.conferenceLink}" target="_blank">${paper.conference}</a>
                        </div>
                        <div class="paper-links">
                            ${paper.paperLink ? `<a href="${paper.paperLink}" class="paper-link" target="_blank"><span>🗐</span> View Full Paper</a>` : ''}
                            ${paper.codeLink ? `<a href="${paper.codeLink}" class="paper-link" target="_blank"><span>🖳</span> Source Code</a>` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;

        const btn = document.getElementById('load-more-btn');
        if (visibleCount >= papers.length) btn.style.display = 'none';
    }

    function displayPaperCount(total) {
        const el = document.getElementById('paper-count');
        let displayValue = total >= 10 ? Math.floor(total/10)*10 + "+" : total;
        el.textContent = displayValue;
    }

    const typingText = "Driving us to constantly challenge the status quo and create solutions that shape the future.";
    let index = 0;
    function typeEffect() {
        const el = document.getElementById("typing-text");
        if (index < typingText.length) {
            el.textContent += typingText.charAt(index);
            index++;
            setTimeout(typeEffect, 30);
        }
    }

    const conferences = [...new Set(papers.map(p => p.conference))];
    let confIndex = 0;
    function rotateConference() {
        const el = document.querySelector(".highlight-bg-text");
        el.style.opacity = 0;
        setTimeout(() => {
            confIndex = (confIndex + 1) % conferences.length;
            el.textContent = conferences[confIndex];
            el.style.opacity = 1;
        }, 300);
    }

    function startHighlightAnimation() {
        document.getElementById("running-text").textContent =
            " • Peer-reviewed AI publications accepted by prestigious conferences • Peer-reviewed AI publications accepted by prestigious conferences •";
        setInterval(rotateConference, 3000);
    }

    document.getElementById('load-more-btn').addEventListener('click', (e) => {
        const btn = e.target;
        btn.textContent = "Loading...";
        btn.disabled = true;
        setTimeout(() => {
            visibleCount += step;
            renderPapers();
            btn.textContent = "Load More";
            btn.disabled = false;
        }, 400);
    });

    window.onload = () => {
        renderPapers();
        displayPaperCount(papers.length);
        typeEffect();
        startHighlightAnimation();
    };
</script>
